name: Refresh Surf data

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch market data
        run: python scripts/fetch_surf.py --pretty
      - name: Fetch position risk data
        run: python scripts/fetch_positions.py --pretty
      - name: Fetch Liqwid markets
        run: python scripts/fetch_liqwid.py --pretty
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore: refresh Surf snapshots"
            git push
          else
            echo "No change in data."
          fi
